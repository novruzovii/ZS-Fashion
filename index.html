<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z&S Fashion</title><head>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins;
        }

        body {
            background: #f5f5f5;
        }

        header {
            background: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 60px;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 15px;
        }

        nav a:hover {
            color: #ff4081;
        }

        .cart-icon {
            cursor: pointer;
            font-size: 22px;
        }

        .container {
            display: flex;
            padding: 40px;
            gap: 40px;
        }

        .sidebar {
            width: 220px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            height: fit-content;
        }

        .products {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .product {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: .3s;
            cursor: pointer;
        }

        .product:hover {
            transform: translateY(-5px);
        }

        .product img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .info {
            padding: 15px;
        }

        .title {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .price {
            font-size: 20px;
            font-weight: 600;
            color: #ff4081;
        }

        .add-cart {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .cart {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.2);
            padding: 20px;
            transition: 0.4s;
            overflow: auto;
        }

        .cart.active {
            right: 0;
        }

        .close-cart {
            position: absolute;
            right: 15px;
            top: 15px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
        }

        .cart h2 {
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .cart-item img {
            width: 50px;
            border-radius: 5px;
        }

        .cart-item .remove {
            margin-left: auto;
            cursor: pointer;
            color: red;
            font-weight: bold;
        }

        .cart-item .quantity {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
        }

        .cart-item .quantity button {
            padding: 2px 6px;
            border: none;
            background: #ddd;
            cursor: pointer;
            border-radius: 3px;
        }

        .total {
            font-weight: bold;
            margin-top: 20px;
        }

        .order-btn {
            margin-top: 20px;
            background: #25D366;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        .contact {
            background: white;
            margin: 40px;
            padding: 40px;
            border-radius: 10px;
        }

        .contact h2 {
            margin-bottom: 20px;
        }

        .social-icons {
            display: flex;
            gap: 25px;
            font-size: 30px;
        }

        .social-icons a {
            color: black;
            transition: .4s;
            animation: float 3s ease-in-out infinite;
        }

        .social-icons a:hover {
            transform: scale(1.3);
            color: #ff4081;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0);
            }
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.7);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
            text-align: center;
            position: relative;
        }

        .modal-content img {
            width: 80%;
            height: auto;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .modal-content .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 25px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .color-options {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .color-options img {
            width: 50px;
            height: 50px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 5px;
            object-fit: cover;
        }

        .color-options img.selected {
            border-color: #ff4081;
        }

        .quantity-selector {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .quantity-selector button {
            padding: 5px 10px;
            border: none;
            background: #ddd;
            cursor: pointer;
            border-radius: 5px;
        }

        .quantity-selector span {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Z&S ㅤFASHION</div>
        <nav>
            <a href="#">მთავარი გვერდი</a>
            <a href="#">პროდუქცია</a>
            <a href="#contact">კონტაქტი</a>
        </nav>
        <div class="cart-icon" onclick="toggleCart()"><i class="fa-solid fa-cart-shopping"></i></div>
    </header>

    <div class="container">
        <div class="sidebar"></div>
        <div class="products" id="products"></div>
    </div>

    <!-- CART -->
    <div class="cart" id="cart">
        <button class="close-cart" onclick="toggleCart()">✕</button>
        <h2>კალათა</h2>
        <div id="cart-items"></div>
        <div class="total">სულ: ₾<span id="total">0</span></div>
        <button class="order-btn" onclick="orderWhatsApp()">შეუკვეთეთ WhatsApp-ის საშუალებით</button>
    </div>

    <!-- PRODUCT MODAL -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">✕</button>
            <h3 id="modalTitle"></h3>
            <img id="modalImage" src="">
            <div class="color-options" id="colorOptions"></div>
            <div class="quantity-selector">
                <button onclick="decreaseQuantity()">-</button>
                <span id="modalQuantity">1</span>
                <button onclick="increaseQuantity()">+</button>
            </div>
            <button class="add-cart" onclick="addModalToCart()">კალათაში დამატება</button>
        </div>
    </div>

    <section id="contact" class="contact">
        <h2>კონტაქტი</h2>
        <div class="social-icons">
            <a href="https://instagram.com/novruzovii_00"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://wa.me/+995568713613"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="tel:+995568713613"><i class="fa-solid fa-phone"></i></a>

        </div>
    </section>
    <footer>📍: ლილო მოლი, რიგი: A10 მაღაზია 62</footer>
    <footer>© Z&S Fashion</footer>

    <script>
        let cart = [];
        let total = 0;
        let currentModalProduct = null;
        let currentModalImage = '';
        let currentQuantity = 1;

        // Ürün verileri
        const productsData = [
            {
                name: "შავი კაბა",
                price: 120,
                images: [
                    "https://i.postimg.cc/Z53knVnd/l-20251-s5m547z8-cvl-79-59-92-175-a.webp",
                    "https://i.postimg.cc/CLBXrmjr/l-20231-s3eq21z8-ke8-80-60-89-177-a1.webp",
                    "https://i.postimg.cc/rybY4xvV/OIP.webp"
                ]
            },
            {
                name: "თეთრი ბლუზკა",
                price: 80,
                images: [
                    "https://i.postimg.cc/0Qv9Ph04/l-20252-w5ey03z8-j5e-86-61-90-179-a1.webp",
                    "https://i.postimg.cc/0QzhgfLZ/l-20252-w5ct75z8-cvl-80-60-88-17-a.webp"
                ]
            },
            {
                name: "ჯაგეტი",
                price: 150,
                images: [
                    "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c",
                    "https://images.unsplash.com/photo-1483985988355-763728e1935b"
                ]
            },
            {
                name: "წითელი კაბა",
                price: 140,
                images: [
                    "https://images.unsplash.com/photo-1595777457583-95e059d581b8",
                    "https://images.unsplash.com/photo-1520975922284-9cbe3c7f9a0b"
                ]
            }
        ];

        // Ürünleri sayfaya ekle
        const productsContainer = document.getElementById("products");
        productsData.forEach((product, index) => {
            const div = document.createElement("div");
            div.classList.add("product");
            div.innerHTML = `<img src="${product.images[0]}"><div class="info"><div class="title">${product.name}</div><div class="price">₾${product.price}</div><button class="add-cart">კალათაში დამატება</button></div>`;
            div.addEventListener("click", (e) => {
                if (!e.target.classList.contains("add-cart")) openModal(product);
            });
            div.querySelector(".add-cart").addEventListener("click", (e) => {
                e.stopPropagation();
                addToCart(product.name, product.price, product.images[0], 1);
            });
            productsContainer.appendChild(div);
        });

        // CART FUNCTIONS
        function toggleCart() { document.getElementById("cart").classList.toggle("active"); }
        function updateCart() {
            const itemsDiv = document.getElementById("cart-items");
            itemsDiv.innerHTML = '';
            total = 0;
            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                const div = document.createElement("div");
                div.classList.add("cart-item");
                div.innerHTML = `<img src="${item.image}">${item.name} - ₾${item.price} <div class="quantity"><button onclick="changeQuantity(${index},-1)">-</button><span>${item.quantity}</span><button onclick="changeQuantity(${index},1)">+</button></div><span class="remove" onclick="removeFromCart(${index})">X</span>`;
                itemsDiv.appendChild(div);
            });
            document.getElementById("total").innerText = total;
        }
        function addToCart(name, price, image, quantity) {
            cart.push({ name, price, image, quantity });
            updateCart();
        }
        function removeFromCart(index) { cart.splice(index, 1); updateCart(); }
        function changeQuantity(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            updateCart();
        }
        function orderWhatsApp() {
            if (cart.length === 0) { alert("კალათა ცარიელია"); return; }
            let message = "ახალი შეკვეთა:%0A%0A";
            cart.forEach(item => { message += `${item.name} - ₾${item.price} x${item.quantity} (%0A)${item.image}%0A%0A`; });
            message += `სულ: ₾${total}`;
            window.open(`https://wa.me/+995568713613?text=${message}`);
        }

        // MODAL FUNCTIONS
        function openModal(product) {
            currentModalProduct = product;
            currentQuantity = 1;
            document.getElementById("modalQuantity").innerText = currentQuantity;
            document.getElementById("modalTitle").innerText = product.name;
            document.getElementById("modalImage").src = product.images[0];
            currentModalImage = product.images[0];
            const colorContainer = document.getElementById("colorOptions");
            colorContainer.innerHTML = '';
            product.images.forEach((img, index) => {
                const imgEl = document.createElement("img");
                imgEl.src = img;
                if (index === 0) imgEl.classList.add("selected");
                imgEl.onclick = () => { document.getElementById("modalImage").src = img; currentModalImage = img; colorContainer.querySelectorAll("img").forEach(i => i.classList.remove("selected")); imgEl.classList.add("selected"); };
                colorContainer.appendChild(imgEl);
            });
            document.getElementById("productModal").style.display = 'block';
        }
        function closeModal() { document.getElementById("productModal").style.display = 'none'; }
        function increaseQuantity() { currentQuantity++; document.getElementById("modalQuantity").innerText = currentQuantity; }
        function decreaseQuantity() { if (currentQuantity > 1) currentQuantity--; document.getElementById("modalQuantity").innerText = currentQuantity; }
        function addModalToCart() { addToCart(currentModalProduct.name, currentModalProduct.price, currentModalImage, currentQuantity); closeModal(); }
    </script>

</body>


</html>
